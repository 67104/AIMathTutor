# ============================================================================
# Build the Android APK in the cloud (no local Linux / Android Studio needed).
#
# How to use:
#   1. Push this project to a GitHub repo (see docs/BUILD_ANDROID.md).
#   2. GitHub runs this workflow automatically on push, OR trigger it manually:
#      repo -> Actions tab -> "Build Android APK" -> "Run workflow".
#   3. When it finishes, open the run -> "Artifacts" -> download the .apk.
#   4. Copy the .apk to your phone and install it (allow "unknown sources").
#
# NOTE: the FIRST build can take 20-40 min and may fail on heavy native libs
# (OpenCV / Matplotlib). If it fails, read the log; the usual fix is to drop
# Matplotlib (swap for a Kivy-drawn chart) — see docs/BUILD_ANDROID.md.
# ============================================================================
name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # lets you run it manually from the Actions tab

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Build debug APK with Buildozer
        uses: ArtemSBulgakov/buildozer-action@v1
        id: buildozer
        with:
          command: buildozer android debug
          buildozer_version: stable

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimathtutor-debug-apk
          path: bin/*.apk
          if-no-files-found: error
