# ============================================================================
# Build the Android APK in the cloud (no local Linux / Android Studio needed).
#
# This runs Buildozer directly on an Ubuntu runner (we control the toolchain)
# instead of a third-party Docker action, which is more reliable.
#
# How to use:
#   1. Push this project to GitHub.
#   2. It runs on push, OR: repo -> Actions -> "Build Android APK" -> Run workflow.
#   3. When green, open the run -> Artifacts -> download the .apk.
#   4. Copy the .apk to your phone and install it (allow "unknown sources").
#
# The FIRST build takes 30-60 min (it downloads the Android SDK/NDK and compiles
# CPython + native libs). Later builds are cached and much faster.
# ============================================================================
name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-apk:
    # Pin to 22.04: it has the apt packages python-for-android expects
    # (24.04 dropped libtinfo5 and breaks many p4a recipes).
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout project
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake \
            libffi-dev libssl-dev automake build-essential ccache libltdl-dev

      - name: Install Buildozer + Cython (pinned toolchain)
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Pin python-for-android to a release that builds Python 3.11 — the
          # latest p4a defaults to Python 3.14, which no recipe supports yet.
          # Cython must be <3 for these recipes.
          pip install "Cython==0.29.36" "buildozer==1.5.0" "python-for-android==2024.1.21"

      - name: Cache Android SDK/NDK (safe to reuse; not Python-version specific)
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-sdk-${{ runner.os }}-ndk25b-api34
          # We deliberately do NOT cache the project .buildozer/ build dir, so the
          # Python/recipe compile always starts clean on the pinned toolchain.

      - name: Build debug APK
        run: |
          export PATH="$PATH:$HOME/.local/bin"
          set -o pipefail
          # 'yes |' auto-accepts the Android SDK licence prompt on first run.
          # Tee to a log; on failure print the last 120 lines so the REAL error
          # is right at the bottom of this step — no more hunting the log.
          if ! (yes | buildozer -v android debug 2>&1 | tee build.log); then
            echo ""
            echo "############### BUILD FAILED — LAST 120 LINES ###############"
            tail -n 120 build.log
            exit 1
          fi

      - name: List build output
        if: always()
        run: ls -lh bin/ || echo "no bin/ directory (build did not reach packaging)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: aimathtutor-debug-apk
          path: bin/*.apk
          if-no-files-found: error
